<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftPlan | ניהול</title>
  <link rel="stylesheet" href="style/main.css">
</head>
<body data-page="dashboard">

  <header class="top-bar">
    <a class="logo" href="index.html">ShiftPlan</a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">ראשי</a>
      <a href="shifts.html">משמרות</a>
      <a href="constraints.html">אילוצים</a>
      <a href="dashboard.html" class="active">ניהול</a>
      <a href="login.html" id="loginLink" class="btn-login">התחברות</a>
      <button class="logout-btn hidden" id="logoutBtn">התנתקות</button>
    </nav>
    <button class="menu-btn" id="menuBtn" aria-label="תפריט">☰</button>
  </header>

  <main>
    <section class="page-header">
      <span class="badge" style="background:#FCF3E3;color:#B5790F">Manager Panel</span>
      <h1>ניהול משמרות</h1>
      <p>הוספת משמרות ומעקב אחרי הסידור השבועי.</p>
    </section>

    <div class="week-strip" id="weekStrip" aria-hidden="true"></div>

    <section class="form-layout">
      <form class="shift-form" id="shiftForm">
        <div id="message" class="message hidden"></div>

        <label>
          עובד
          <select id="employeeSelect" required></select>
        </label>

        <label>
          יום
          <select id="shiftDay" required>
            <option>ראשון</option>
            <option>שני</option>
            <option>שלישי</option>
            <option>רביעי</option>
            <option>חמישי</option>
            <option>שישי</option>
            <option>שבת</option>
          </select>
        </label>

        <div class="two-cols">
          <label>
            התחלה
            <input type="time" id="startTime" required>
          </label>
          <label>
            סיום
            <input type="time" id="endTime" required>
          </label>
        </div>

        <label>
          תפקיד
          <input id="role" required placeholder="נציג שירות">
        </label>

        <label>
          מחלקה
          <input id="department" required placeholder="שירות">
        </label>

        <button class="btn primary" type="submit">הוספת משמרת</button>
      </form>

      <aside class="tips">
        <h3>סטטיסטיקות</h3>
        <div id="statsBox" class="list" style="margin-top:6px"></div>
      </aside>
    </section>

    <section class="panel">
      <h2>יצירת משתמש חדש</h2>
      <p style="color:var(--muted);font-size:0.88rem;margin-bottom:14px">
        רק מנהל יכול ליצור חשבונות חדשים לעובדים או למנהלים נוספים.
      </p>
      <form id="createUserForm" class="shift-form">
        <div id="createUserMessage" class="message hidden"></div>

        <label>
          שם מלא
          <input id="newUserName" required placeholder="לדוגמה: דנה כהן">
        </label>

        <label>
          אימייל
          <input id="newUserEmail" type="email" required placeholder="dana@shiftplan.com">
        </label>

        <label>
          סיסמה זמנית
          <input id="newUserPassword" type="password" required minlength="6" placeholder="לפחות 6 תווים">
        </label>

        <div class="two-cols">
          <label>
            תפקיד
            <select id="newUserRole" required>
              <option value="employee">עובד</option>
              <option value="manager">מנהל</option>
            </select>
          </label>
          <label>
            מחלקה
            <input id="newUserDepartment" required placeholder="שירות">
          </label>
        </div>

        <button class="btn primary" type="submit">יצירת משתמש</button>
      </form>
    </section>

    <section class="panel">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px">
        <h2 style="margin:0">רשימת עובדים</h2>
        <button class="btn secondary" id="loadEmployeesBtn">הצגת כל העובדים</button>
      </div>
      <div id="employeesList" class="list"></div>
    </section>
  </main>

  <footer>© 2026 ShiftPlan — עומר לחאם ועבדאללה עיד</footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login-modal.js"></script>
  <script src="js/week-strip.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
