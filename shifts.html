<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShiftPlan | משמרות</title>
  <link rel="stylesheet" href="style/main.css">
</head>
<body>

  <header class="top-bar">
    <a class="logo" href="index.html">ShiftPlan</a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">ראשי</a>
      <a href="shifts.html" class="active">משמרות</a>
      <a href="constraints.html">אילוצים</a>
      <a href="dashboard.html">ניהול</a>
      <a href="login.html" id="loginLink" class="btn-login">התחברות</a>
      <button class="logout-btn hidden" id="logoutBtn">התנתקות</button>
    </nav>
    <button class="menu-btn" id="menuBtn" aria-label="תפריט">☰</button>
  </header>

  <main>
    <section class="page-header">
      <span class="badge" style="background:#FCF3E3;color:#B5790F">REST API</span>
      <h1 id="shiftsPageTitle">סידור משמרות</h1>
      <p>הנתונים נשלפים מהשרת ומה-Database בזמן אמת.</p>
    </section>

    <div class="week-strip" id="weekStrip" aria-hidden="true"></div>

    <section class="filters">
      <label id="searchFilterGroup">
        חיפוש עובד
        <input id="searchInput" placeholder="לדוגמה: עומר">
      </label>
      <label>
        סינון יום
        <select id="dayFilter">
          <option value="all">כל הימים</option>
          <option>ראשון</option>
          <option>שני</option>
          <option>שלישי</option>
          <option>רביעי</option>
          <option>חמישי</option>
          <option>שישי</option>
          <option>שבת</option>
        </select>
      </label>
      <button class="btn primary" id="refreshShifts">רענון</button>
    </section>

    <section class="cards-grid" id="shiftsContainer"></section>
    <p class="empty-message hidden" id="emptyMessage">לא נמצאו משמרות.</p>
  </main>

  <footer>© 2026 ShiftPlan — עומר לחאם ועבדאללה עיד</footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login-modal.js"></script>
  <script src="js/week-strip.js"></script>
  <script src="js/shifts.js"></script>
</body>
</html>
